<svg viewBox="0 0 400 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="120" fill="none"/>

  <!-- Stylized S -->
  <g id="logo-s">
    <defs>
      <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#E8C547;stop-opacity:1" />
        <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#AA8C2A;stop-opacity:1" />
      </linearGradient>
      <filter id="shadow">
        <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.3"/>
      </filter>
    </defs>

    <!-- Circle arc top -->
    <path d="M 50 35 A 30 30 0 0 1 90 35" stroke="#C9A84C" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Circle arc bottom -->
    <path d="M 50 85 A 30 30 0 0 0 90 85" stroke="#C9A84C" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Main S -->
    <path d="M 70 40 Q 55 32 55 50 Q 55 65 70 72 Q 85 79 85 92 Q 85 105 70 112 Q 55 117 45 112"
          stroke="url(#goldGrad)" stroke-width="12" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>

    <!-- Star burst top right -->
    <line x1="100" y1="30" x2="112" y2="18" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="30" x2="115" y2="30" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="100" y1="30" x2="112" y2="42" stroke="#C9A84C" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="100" cy="30" r="2" fill="#C9A84C"/>
  </g>

  <!-- Text: Charlie's -->
  <text x="125" y="55" font-family="Georgia, serif" font-size="32" font-style="italic" fill="#C9A84C" font-weight="300" letter-spacing="1">Charlie's</text>

  <!-- Text: Events -->
  <text x="125" y="85" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#C9A84C" font-weight="300" letter-spacing="1">Events</text>

  <!-- Decorative line -->
  <line x1="120" y1="92" x2="185" y2="92" stroke="#C9A84C" stroke-width="1" opacity="0.6"/>
</svg>
