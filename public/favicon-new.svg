<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="200" height="200" fill="#0F0F0F"/>

  <!-- Decorative elements background -->
  <defs>
    <linearGradient id="goldGradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8C547;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#D4AF37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#AA8C2A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Circle arc top -->
  <path d="M 50 60 A 50 50 0 0 1 150 60" stroke="#C9A84C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Circle arc bottom -->
  <path d="M 50 140 A 50 50 0 0 0 150 140" stroke="#C9A84C" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Stylized S -->
  <path d="M 100 70 Q 85 65 85 80 Q 85 95 100 105 Q 115 115 115 130 Q 115 145 100 155 Q 85 160 75 155"
        stroke="url(#goldGradFav)" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Star burst top right -->
  <g id="star-favicon">
    <line x1="155" y1="55" x2="168" y2="42" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <line x1="155" y1="55" x2="170" y2="55" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <line x1="155" y1="55" x2="168" y2="68" stroke="#C9A84C" stroke-width="2" stroke-linecap="round"/>
    <circle cx="155" cy="55" r="3" fill="#C9A84C"/>
  </g>

  <!-- Text: C -->
  <text x="30" y="110" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#C9A84C" font-weight="300">C</text>

  <!-- Text: E -->
  <text x="165" y="110" font-family="Georgia, serif" font-size="28" font-style="italic" fill="#C9A84C" font-weight="300">E</text>
</svg>
